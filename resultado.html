<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <style>
        body { margin: 0; background: rgba(15, 15, 19, 0.98); color: #fff; display: flex; align-items: center; justify-content: center; height: 100vh; font-family: 'Segoe UI', Tahoma, sans-serif; border: 3px solid #d4af37; border-radius: 10px; overflow: hidden; box-shadow: inset 0 0 40px rgba(0,0,0,0.9); }
        .content { text-align: center; width: 100%; padding: 20px; }
        .char-name { color: #d4af37; font-weight: 900; font-size: 22px; text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 0 10px rgba(212, 175, 55, 0.4);}
        .action { font-size: 14px; color: #8a8a9e; margin: 5px 0 15px 0; text-transform: uppercase;}
        
        .dice-container { background: #1a1a24; padding: 20px 40px; border-radius: 8px; border: 1px solid #333; display: inline-block; box-shadow: 0 5px 15px rgba(0,0,0,0.5);}
        .roll { font-size: 38px; font-weight: bold; color: #fff; text-shadow: 0 0 15px rgba(255, 255, 255, 0.5); letter-spacing: 3px;}
        .penalty { color: #ff4444; font-size: 12px; font-weight: bold; margin-bottom: 10px; display: none;}

        .btn-close { margin-top: 25px; background: transparent; color: #666; border: none; cursor: pointer; transition: 0.2s; font-size: 12px; text-decoration: underline;}
        .btn-close:hover { color: #d4af37; }
    </style>
</head>
<body>
    <div class="content">
        <div class="char-name" id="c-name">Rolando...</div>
        <div class="action" id="c-action">...</div>
        
        <div class="penalty" id="c-pen">⚠️ SOBREPESO: -5 APLICADO</div>

        <div class="dice-container">
            <div class="roll" id="c-roll">...</div>
        </div>

        <br>
        <button class="btn-close" onclick="fecharModal()">Fechar Janela</button>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@owlbear-rodeo/sdk@2/lib/index.js"></script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const charName = params.get('c');
        const skill = params.get('s');
        const attr = params.get('a');
        const results = params.get('r');
        const penalty = params.get('pen');
        
        if (charName) {
            document.getElementById('c-name').innerText = charName;
            document.getElementById('c-action').innerHTML = `ROLOU <b>${skill}</b> <span style="font-size:11px;">(${attr})</span>`;
            
            const formattedResults = results.split(',').join(' <span style="color:#d4af37;">|</span> ');
            document.getElementById('c-roll').innerHTML = `[ ${formattedResults} ]`;

            if(penalty === "true") document.getElementById('c-pen').style.display = "block";
        }

        function fecharModal() {
            if (typeof OBR !== 'undefined' && OBR.isReady) OBR.modal.close('fate-roll-modal');
        }

        setTimeout(fecharModal, 4500);
    </script>
</body>
</html>
