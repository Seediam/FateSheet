<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8" />
  <title>Fate Sheet</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #1e1e1e;
      color: white;
    }

    #loading {
      padding: 20px;
      text-align: center;
      font-size: 18px;
    }

    .app-container {
      padding: 15px;
    }

    h2 {
      margin-top: 20px;
    }

    input {
      width: 100%;
      padding: 8px;
      margin-bottom: 8px;
      background: #2e2e2e;
      border: 1px solid #444;
      color: white;
      border-radius: 4px;
    }

    button {
      padding: 8px 12px;
      margin-bottom: 8px;
      border: none;
      border-radius: 4px;
      background: #4c8bf5;
      color: white;
      cursor: pointer;
    }

    button:hover {
      background: #3a6edc;
    }

    .char-card {
      background: #2a2a2a;
      padding: 8px;
      margin-bottom: 6px;
      border-radius: 4px;
    }

    #combat-tracker {
      margin-top: 10px;
      background: #2a2a2a;
      padding: 8px;
      border-radius: 4px;
    }

    .turn {
      padding: 5px;
    }

    .turn-active {
      padding: 5px;
      background: #4c8bf5;
      border-radius: 4px;
    }
  </style>
</head>
<body>

  <!-- Loading -->
  <div id="loading">
    📖 Carregando Fate Sheet...
  </div>

  <!-- App -->
  <div id="app" class="app-container" style="display:none;">

    <h2>Criar Personagem</h2>

    <input type="text" id="char-name" placeholder="Nome do personagem">
    <input type="number" id="char-hp" placeholder="HP">
    <input type="number" id="char-mp" placeholder="MP">

    <button onclick="handleCreateCharacter()">Criar</button>

    <h2>Personagens</h2>
    <div id="character-list"></div>

    <h2>Combate</h2>

    <button onclick="handleStartCombat()">Iniciar Combate</button>
    <button onclick="nextTurn()">Próximo Turno</button>
    <button onclick="endCombat()">Encerrar Combate</button>

    <div id="combat-tracker"></div>

  </div>

  <!-- SCRIPT -->
  <script type="module" src="script.js"></script>

  <script>
    function handleCreateCharacter() {
      const name = document.getElementById("char-name").value;
      const hp = parseInt(document.getElementById("char-hp").value);
      const mp = parseInt(document.getElementById("char-mp").value);

      if (!name) return;

      window.createCharacter({
        name,
        hp,
        mp
      });

      document.getElementById("char-name").value = "";
      document.getElementById("char-hp").value = "";
      document.getElementById("char-mp").value = "";
    }

    function handleStartCombat() {
      const ids = Object.keys(window.state?.characters || {});

      if (ids.length === 0) {
        alert("Nenhum personagem criado.");
        return;
      }

      window.startCombat(ids);
    }
  </script>

</body>
</html>
