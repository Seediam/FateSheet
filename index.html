<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fate Sheet</title>
    
    <style>
        :root {
            --bg-dark: #0f0f13; --bg-panel: #1c1c24; --accent-gold: #d4af37;
            --accent-glow: rgba(212, 175, 55, 0.3); --text-main: #eaeaef;
            --text-muted: #8a8a9e; --border-subtle: #2a2a35;
        }

        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg-dark); color: var(--text-main); padding: 15px; margin: 0; overflow-x: hidden; }

        .screen { display: none; animation: fadeIn 0.3s ease; }
        .screen.active { display: block; }

        .top-bar { display: flex; justify-content: space-between; margin-bottom: 15px; border-bottom: 1px solid var(--border-subtle); padding-bottom: 10px;}
        .btn-new { width: 100%; padding: 12px; background: rgba(212, 175, 55, 0.05); border: 1px dashed var(--accent-gold); color: var(--accent-gold); font-weight: bold; font-size: 14px; border-radius: 6px; cursor: pointer; transition: 0.2s; margin-bottom: 20px;}
        .btn-new:hover { background: var(--accent-gold); color: #000; }

        .folder-title { color: var(--text-muted); font-size: 12px; text-transform: uppercase; letter-spacing: 1px; margin: 15px 0 5px 0; border-bottom: 1px solid var(--border-subtle); padding-bottom: 3px; }
        .char-list { display: flex; flex-direction: column; gap: 8px; margin-bottom: 15px; }
        .char-list-item { background: var(--bg-panel); padding: 10px 15px; border-radius: 6px; cursor: pointer; border: 1px solid transparent; transition: 0.2s; font-weight: bold; border-left: 4px solid var(--accent-gold); display: flex; justify-content: space-between;}
        .char-list-item:hover { background: #23232d; border-color: var(--border-subtle); transform: translateX(3px); }

        .tabs { display: flex; gap: 15px; margin-bottom: 20px; border-bottom: 2px solid var(--border-subtle); padding-bottom: 5px; }
        .tab-btn { background: none; border: none; color: var(--text-muted); font-size: 16px; font-weight: 600; cursor: pointer; padding: 8px 12px; transition: all 0.3s ease; text-transform: uppercase; letter-spacing: 1px; }
        .tab-btn:hover { color: var(--text-main); }
        .tab-btn.active { color: var(--accent-gold); border-bottom: 2px solid var(--accent-gold); text-shadow: 0 0 8px var(--accent-glow); }

        .tab-content { display: none; animation: fadeIn 0.3s ease; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .form-group { margin-bottom: 12px; }
        label { display: block; font-size: 11px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 4px; letter-spacing: 0.5px; }
        input[type="text"], input[type="number"], select { width: 100%; background: var(--bg-panel); border: 1px solid var(--border-subtle); color: var(--text-main); padding: 10px; border-radius: 6px; box-sizing: border-box; transition: 0.2s; }
        input:focus, select:focus { border-color: var(--accent-gold); outline: none; box-shadow: 0 0 5px var(--accent-glow); }
        
        .photo-slot { width: 90px; height: 120px; background: var(--bg-panel); border: 1px dashed var(--accent-gold); border-radius: 6px; display: flex; align-items: center; justify-content: center; color: var(--text-muted); font-size: 12px; text-align: center; box-shadow: inset 0 0 10px rgba(0,0,0,0.5); cursor: pointer; background-size: cover; background-position: center; transition: 0.2s; overflow: hidden;}

        .section-title { color: var(--accent-gold); margin: 20px 0 10px 0; border-bottom: 1px solid var(--border-subtle); padding-bottom: 5px; }
        .attr-box { display: flex; justify-content: space-between; align-items: center; background: linear-gradient(90deg, var(--bg-panel) 0%, var(--bg-dark) 100%); padding: 12px 15px; margin-bottom: 8px; border-radius: 6px; border-left: 4px solid var(--accent-gold); font-weight: bold; }
        .attr-input { width: 60px !important; text-align: center; font-size: 16px; font-weight: bold;}
        .d20-icon { width: 16px; height: 16px; fill: none; stroke: var(--accent-gold); stroke-width: 2; vertical-align: middle; margin-left: 6px; margin-bottom: 2px;}

        .skill-item { display: flex; justify-content: space-between; align-items: center; background: var(--bg-panel); padding: 10px 15px; margin-bottom: 8px; border-radius: 6px; cursor: pointer; border: 1px solid transparent; transition: 0.2s; }
        .skill-item:hover { background: #23232d; border-color: var(--border-subtle); transform: translateX(3px); }
        .skill-controls { display: flex; align-items: center; gap: 12px; }
        .btn-ctrl { background: var(--border-subtle); border: none; color: var(--text-main); width: 28px; height: 28px; border-radius: 4px; cursor: pointer; font-weight: bold; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .btn-ctrl:hover { background: var(--accent-gold); color: #000; }

        .toast { visibility: hidden; min-width: 280px; background-color: rgba(20, 20, 25, 0.95); border: 2px solid var(--accent-gold); color: #fff; text-align: center; border-radius: 8px; padding: 20px; position: fixed; z-index: 9999; left: 50%; top: 50%; transform: translate(-50%, -50%) scale(0.9); box-shadow: 0 0 20px rgba(212, 175, 55, 0.4), inset 0 0 10px rgba(0,0,0,0.8); opacity: 0; transition: all 0.2s ease; cursor: pointer; font-size: 16px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; pointer-events: none;}
        .toast.show { visibility: visible; opacity: 1; transform: translate(-50%, -50%) scale(1); pointer-events: auto;}
    </style>
</head>
<body>

    <div id="screen-list" class="screen active">
        <h3 class="section-title" style="text-align: center; margin-top: 5px;">Grimório da Mesa</h3>
        <button class="btn-new" onclick="createNewCharacter()">+ Criar Personagem</button>
        <div id="character-folders"></div>
    </div>

    <div id="screen-sheet" class="screen">
        <div class="top-bar">
            <button class="btn-ctrl" onclick="backToList()" style="width: auto; padding: 0 10px;">← Voltar</button>
            <button class="btn-ctrl" onclick="deleteCharacter()" style="width: auto; padding: 0 10px; background: #5a1a1a;">Apagar Ficha</button>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="openTab('personagem', event)">Personagem</button>
            <button class="tab-btn" onclick="openTab('pericias', event)">Perícias</button>
        </div>

        <div id="personagem" class="tab-content active">
            <div style="display: flex; gap: 15px; margin-bottom: 20px;">
                <label for="photo-upload" class="photo-slot" id="photo-preview"><span id="photo-text">📷<br>Importar</span></label>
                <input type="file" id="photo-upload" accept="image/*" style="display: none;">
                <div style="flex: 1;">
                    <div class="form-group"><label>Nome</label><input type="text" id="char-name"></div>
                    <div style="display: flex; gap: 10px;">
                        <div class="form-group" style="flex: 1;"><label>Idade</label><input type="number" id="char-age"></div>
                        <div class="form-group" style="flex: 1;"><label>Raça</label><input type="text" id="char-race" value="Humano"></div>
                    </div>
                </div>
            </div>

            <div class="form-group" style="margin-bottom: 20px;">
                <label>📁 Pasta / Categoria</label>
                <select id="char-category" onchange="saveData()">
                    <option value="Jogadores">Jogadores</option>
                    <option value="NPCs">NPCs</option>
                    <option value="Monstros">Monstros</option>
                </select>
            </div>

            <h4 class="section-title">Atributos</h4>
            <div class="attr-box"><span>Força <svg class="d20-icon" width="16" height="16" fill="none" stroke="#d4af37" viewBox="0 0 24 24"><polygon points="12 2 2 12 12 22 22 12 12 2"></polygon><line x1="12" y1="2" x2="12" y2="22"></line><line x1="2" y1="12" x2="22" y2="12"></line></svg></span><input type="number" id="attr-forca" class="attr-input" value="1"></div>
            <div class="attr-box"><span>Magia <svg class="d20-icon" width="16" height="16" fill="none" stroke="#d4af37" viewBox="0 0 24 24"><polygon points="12 2 2 12 12 22 22 12 12 2"></polygon><line x1="12" y1="2" x2="12" y2="22"></line><line x1="2" y1="12" x2="22" y2="12"></line></svg></span><input type="number" id="attr-magia" class="attr-input" value="1"></div>
            <div class="attr-box"><span>Agilidade <svg class="d20-icon" width="16" height="16" fill="none" stroke="#d4af37" viewBox="0 0 24 24"><polygon points="12 2 2 12 12 22 22 12 12 2"></polygon><line x1="12" y1="2" x2="12" y2="22"></line><line x1="2" y1="12" x2="22" y2="12"></line></svg></span><input type="number" id="attr-agilidade" class="attr-input" value="1"></div>
            <div class="attr-box"><span>Sorte <svg class="d20-icon" width="16" height="16" fill="none" stroke="#d4af37" viewBox="0 0 24 24"><polygon points="12 2 2 12 12 22 22 12 12 2"></polygon><line x1="12" y1="2" x2="12" y2="22"></line><line x1="2" y1="12" x2="22" y2="12"></line></svg></span><input type="number" id="attr-sorte" class="attr-input" value="1"></div>

            <h4 class="section-title">📖 Grimório</h4>
            <div class="form-group"><input type="text" id="grimoire-name" placeholder="Nome do Grimório"></div>
            <div class="form-group"><label>🔮 Mana Zone</label><input type="text" id="mana-zone"></div>
            <div class="form-group"><label>Habilidade 1</label><input type="text" id="hab-1"></div>
            <div class="form-group"><label>Habilidade 2</label><input type="text" id="hab-2"></div>
            <div class="form-group"><label>Habilidade 3</label><input type="text" id="hab-3"></div>
            <div class="form-group"><label>Habilidade 4</label><input type="text" id="hab-4"></div>
        </div>

        <div id="pericias" class="tab-content"><div id="skills-container"></div></div>
    </div>

    <div id="toast" class="toast"></div>

    <script src="https://cdn.jsdelivr.net/npm/@owlbear-rodeo/sdk@2/lib/index.js"></script>
    
    <script>
        const skillsData = [
            { name: "Arcanismo", attr: "Magia" }, { name: "História", attr: "Magia" }, { name: "Natureza", attr: "Magia" }, { name: "Religião", attr: "Magia" },
            { name: "Intuição", attr: "Sorte" }, { name: "Medicina", attr: "Sorte" }, { name: "Percepção", attr: "Sorte" }, { name: "Sobrevivência", attr: "Sorte" },
            { name: "Atletismo", attr: "Força" }, { name: "Intimidação", attr: "Força" },
            { name: "Acrobacia", attr: "Agilidade" }, { name: "Furtividade", attr: "Agilidade" }, { name: "Prestidigitação", attr: "Agilidade" },
            { name: "Atuação", attr: "Sorte" }, { name: "Enganação", attr: "Sorte" }, { name: "Persuasão", attr: "Sorte" }
        ];

        let characters = {}; 
        let currentCharId = null;
        let playerSkills = {}; 
        let currentPhoto = "";
        let toastTimer = null;

        function openTab(tabName, event) {
            document.querySelectorAll('.tab-content').forEach(tab => tab.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById(tabName).classList.add('active');
            if(event) event.currentTarget.classList.add('active');
        }

        function backToList() {
            saveData();
            document.getElementById('screen-sheet').classList.remove('active');
            document.getElementById('screen-list').classList.add('active');
        }

        function renderCharacterList() {
            const container = document.getElementById('character-folders');
            if(!container) return;
            container.innerHTML = '';

            const categories = { "Jogadores": [], "NPCs": [], "Monstros": [] };

            for (let id in characters) {
                let char = characters[id];
                let cat = char.category || "Jogadores";
                if (!categories[cat]) categories[cat] = [];
                categories[cat].push({ id: id, name: char.name || "Sem Nome", owner: char.ownerName || "?" });
            }

            let hasAny = false;
            for (let cat in categories) {
                if (categories[cat].length > 0) {
                    hasAny = true;
                    let html = `<div class="folder-title">📁 ${cat}</div><div class="char-list">`;
                    categories[cat].forEach(char => {
                        html += `<div class="char-list-item" onclick="openCharacter('${char.id}')">
                                    <span>${char.name}</span>
                                    <span style="font-size: 10px; color: #666; font-weight: normal;">por ${char.owner}</span>
                                 </div>`;
                    });
                    html += `</div>`;
                    container.innerHTML += html;
                }
            }

            if(!hasAny) {
                container.innerHTML = '<div style="text-align:center; color:#666; margin-top: 20px;">Nenhum personagem na mesa ainda.</div>';
            }
        }

        function createNewCharacter() {
            const newId = 'char_' + Date.now();
            characters[newId] = { name: "Novo Personagem", category: "Jogadores", skills: {}, photo: "" };
            openCharacter(newId);
        }

        function deleteCharacter() {
            if(confirm("Deseja mesmo apagar esta ficha da mesa? Todos perderão o acesso a ela.")) {
                delete characters[currentCharId];
                if (typeof OBR !== 'undefined' && OBR.isReady) {
                    OBR.room.setMetadata({ [`fate_char_${currentCharId}`]: undefined });
                }
                backToList();
                renderCharacterList();
            }
        }

        function openCharacter(id) {
            currentCharId = id;
            const charData = characters[id] || {};
            
            document.getElementById('char-name').value = charData.name || '';
            document.getElementById('char-category').value = charData.category || 'Jogadores';
            document.getElementById('char-age').value = charData.age || '';
            document.getElementById('char-race').value = charData.race || 'Humano';
            document.getElementById('attr-forca').value = charData.forca || 1;
            document.getElementById('attr-magia').value = charData.magia || 1;
            document.getElementById('attr-agilidade').value = charData.agilidade || 1;
            document.getElementById('attr-sorte').value = charData.sorte || 1;
            document.getElementById('grimoire-name').value = charData.grimoire || '';
            document.getElementById('mana-zone').value = charData.mana || '';
            document.getElementById('hab-1').value = charData.hab1 || '';
            document.getElementById('hab-2').value = charData.hab2 || '';
            document.getElementById('hab-3').value = charData.hab3 || '';
            document.getElementById('hab-4').value = charData.hab4 || '';
            
            playerSkills = charData.skills || {};
            currentPhoto = charData.photo || '';
            setPhotoPreview(currentPhoto);
            renderSkills();

            document.getElementById('screen-list').classList.remove('active');
            document.getElementById('screen-sheet').classList.add('active');
        }

        async function saveData() {
            if (!currentCharId) return; 

            let playerName = "Mesa";
            if (typeof OBR !== 'undefined' && OBR.isReady) playerName = await OBR.player.getName();

            const sheetData = {
                name: document.getElementById('char-name').value,
                category: document.getElementById('char-category').value,
                ownerName: playerName,
                age: document.getElementById('char-age').value,
                race: document.getElementById('char-race').value,
                forca: document.getElementById('attr-forca').value,
                magia: document.getElementById('attr-magia').value,
                agilidade: document.getElementById('attr-agilidade').value,
                sorte: document.getElementById('attr-sorte').value,
                grimoire: document.getElementById('grimoire-name').value,
                mana: document.getElementById('mana-zone').value,
                hab1: document.getElementById('hab-1').value,
                hab2: document.getElementById('hab-2').value,
                hab3: document.getElementById('hab-3').value,
                hab4: document.getElementById('hab-4').value,
                skills: playerSkills,
                photo: "" 
            };

            characters[currentCharId] = sheetData;
            
            if (typeof OBR !== 'undefined' && OBR.isReady) {
                await OBR.room.setMetadata({ [`fate_char_${currentCharId}`]: sheetData });
            }
        }

        function renderSkills() {
            const container = document.getElementById('skills-container');
            if(!container) return;
            container.innerHTML = '';

            skillsData.forEach(skill => {
                if (playerSkills[skill.name] === undefined) playerSkills[skill.name] = 0;
                const div = document.createElement('div');
                div.className = 'skill-item';
                div.innerHTML = `
                    <div onclick="rollSkill('${skill.name}', '${skill.attr}')" style="flex:1;">
                        <strong>${skill.name}</strong> <span style="font-size: 10px; color: var(--text-muted);">(${skill.attr})</span>
                    </div>
                    <div class="skill-controls">
                        <button class="btn-ctrl" onclick="updateSkill('${skill.name}', -1, event)">-</button>
                        <span style="width: 20px; text-align: center;">${playerSkills[skill.name]}</span>
                        <button class="btn-ctrl" onclick="updateSkill('${skill.name}', 1, event)">+</button>
                    </div>
                `;
                container.appendChild(div);
            });
        }

        function updateSkill(skillName, change, event) {
            event.stopPropagation(); 
            playerSkills[skillName] += change;
            if (playerSkills[skillName] < 0) playerSkills[skillName] = 0;
            renderSkills();
            saveData();
        }

        function showCenterToast(msg) {
            const toast = document.getElementById("toast");
            toast.innerText = msg;
            toast.classList.add("show");
            
            if(toastTimer) clearTimeout(toastTimer);
            toast.onclick = () => toast.classList.remove("show");
            toastTimer = setTimeout(() => { toast.classList.remove("show"); }, 4500);
        }

        function rollSkill(skillName, attrName) {
            const attrInputId = `attr-${attrName.toLowerCase()}`;
            let diceCount = parseInt(document.getElementById(attrInputId).value) || 1;
            if(diceCount < 1) diceCount = 1;

            let results = [];
            for (let i = 0; i < diceCount; i++) {
                results.push(Math.floor(Math.random() * 20) + 1);
            }

            const charName = document.getElementById('char-name').value || 'Desconhecido';
            const message = `🎲 ${charName}\n rolou ${skillName} (${attrName})\n [ ${results.join(' | ')} ]`;
            
            showCenterToast(message);

            if (typeof OBR !== 'undefined' && OBR.isReady) {
                OBR.broadcast.sendMessage("fate-system-rolls", message);
            }
        }

        document.getElementById('photo-upload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    currentPhoto = event.target.result;
                    setPhotoPreview(currentPhoto);
                };
                reader.readAsDataURL(file);
            }
        });

        function setPhotoPreview(base64Str) {
            const preview = document.getElementById('photo-preview');
            const text = document.getElementById('photo-text');
            if (base64Str) {
                preview.style.backgroundImage = `url("${base64Str}")`;
                preview.style.border = 'none';
                text.style.display = 'none';
            } else {
                preview.style.backgroundImage = 'none';
                preview.style.border = '1px dashed var(--accent-gold)';
                text.style.display = 'block';
            }
        }

        document.addEventListener('input', saveData);

        function processRoomData(metadata) {
            let mudouAlgo = false;
            for (let key in metadata) {
                if (key.startsWith('fate_char_')) {
                    const id = key.replace('fate_char_', '');
                    if (metadata[key] === undefined || metadata[key] === null) {
                        if(characters[id]) { delete characters[id]; mudouAlgo = true; }
                    } else {
                        characters[id] = metadata[key];
                        mudouAlgo = true;
                    }
                }
            }
            if (mudouAlgo) renderCharacterList();
        }

        if (typeof OBR !== 'undefined') {
            OBR.onReady(async () => {
                const initialMeta = await OBR.room.getMetadata();
                processRoomData(initialMeta);
                renderCharacterList();

                OBR.room.onMetadataChange((metadata) => {
                    processRoomData(metadata);
                });
                
                OBR.broadcast.onMessage("fate-system-rolls", (event) => {
                    showCenterToast(event.data);
                });
            });
        }
    </script>
</body>
</html>
