<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fate Sheet</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="gm-panel" class="gm-panel">
        <label>👑 Visão do Mestre: Fichas Ativas</label>
        <select id="gm-player-select">
            <option value="local">Sua própria ficha</option>
        </select>
    </div>

    <div class="tabs">
        <button class="tab-btn active" onclick="openTab('personagem')">Personagem</button>
        <button class="tab-btn" onclick="openTab('pericias')">Perícias</button>
    </div>

    <div id="personagem" class="tab-content active">
        <div style="display: flex; gap: 15px; margin-bottom: 20px;">
            <div class="photo-slot">📷<br>Foto</div>
            <div style="flex: 1;">
                <div class="form-group"><label>Nome</label><input type="text" id="char-name"></div>
                <div style="display: flex; gap: 10px;">
                    <div class="form-group"><label>Idade</label><input type="number" id="char-age"></div>
                    <div class="form-group"><label>Raça</label><input type="text" id="char-race" value="Humano" readonly></div>
                </div>
            </div>
        </div>

        <h4 style="color: var(--accent-gold); margin-bottom: 10px; border-bottom: 1px solid var(--border-subtle); padding-bottom: 5px;">Atributos</h4>
        <div class="attr-box">Força <input type="number" id="attr-forca" class="attr-input" value="1" onchange="saveData()"></div>
        <div class="attr-box">Magia <input type="number" id="attr-magia" class="attr-input" value="1" onchange="saveData()"></div>
        <div class="attr-box">Agilidade <input type="number" id="attr-agilidade" class="attr-input" value="1" onchange="saveData()"></div>
        <div class="attr-box">Sorte <input type="number" id="attr-sorte" class="attr-input" value="1" onchange="saveData()"></div>

        <h4 style="color: var(--accent-gold); margin-top: 20px; border-bottom: 1px solid var(--border-subtle); padding-bottom: 5px;">📖 Grimório</h4>
        <div class="form-group"><input type="text" id="grimoire-name" placeholder="Nome do Grimório"></div>
        <div class="form-group"><label>🔮 Mana Zone</label><input type="text" id="mana-zone"></div>
        
        <div class="form-group"><label>Habilidade 1 (Desc | Custo | Alcance)</label><input type="text" id="hab-1"></div>
        <div class="form-group"><label>Habilidade 2</label><input type="text" id="hab-2"></div>
        <div class="form-group"><label>Habilidade 3</label><input type="text" id="hab-3"></div>
        <div class="form-group"><label>Habilidade 4</label><input type="text" id="hab-4"></div>
    </div>

    <div id="pericias" class="tab-content">
        <div id="skills-container"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@owlbear-rodeo/sdk@2/lib/index.js"></script>
    <script src="script.js"></script>
</body>
</html>
