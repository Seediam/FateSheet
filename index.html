<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fate Sheet</title>
    <style>
        :root { --bg-dark: #0f0f13; --bg-panel: #1c1c24; --accent-gold: #d4af37; --accent-glow: rgba(212, 175, 55, 0.3); --text-main: #eaeaef; --text-muted: #8a8a9e; --border-subtle: #2a2a35; --danger: #ff4444; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg-dark); color: var(--text-main); padding: 15px; margin: 0; overflow-x: hidden; }
        #loading { text-align: center; color: var(--accent-gold); margin-top: 50px; font-weight: bold; font-size: 18px; animation: pulse 1.5s infinite;}
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
        .app-container { display: none; }
        .screen { display: none; animation: fadeIn 0.3s ease; }
        .screen.active { display: block; }
        
        .top-bar { display: flex; justify-content: space-between; margin-bottom: 15px; border-bottom: 1px solid var(--border-subtle); padding-bottom: 10px;}
        .btn-new { width: 100%; padding: 12px; background: rgba(212, 175, 55, 0.05); border: 1px dashed var(--accent-gold); color: var(--accent-gold); font-weight: bold; font-size: 14px; border-radius: 6px; cursor: pointer; transition: 0.2s; margin-bottom: 10px;}
        .btn-new:hover { background: var(--accent-gold); color: #000; }
        
        .btn-import { width: 100%; padding: 10px; background: #1a1a24; border: 1px solid var(--border-subtle); color: var(--text-muted); font-size: 12px; border-radius: 6px; cursor: pointer; transition: 0.2s; margin-bottom: 20px;}
        .btn-import:hover { border-color: var(--accent-gold); color: var(--accent-gold); }

        .folder-header { display: flex; align-items: center; cursor: pointer; color: var(--accent-gold); font-size: 13px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; margin: 15px 0 8px 0; border-bottom: 1px solid var(--border-subtle); padding-bottom: 5px; transition: 0.2s;}
        .folder-header:hover { color: #fff; }
        .chevron { display: inline-block; width: 15px; transition: transform 0.3s ease; }
        .folder-content { display: none; flex-direction: column; gap: 8px; margin-bottom: 15px; }
        .folder-content.open { display: flex; }

        .char-list-item { background: var(--bg-panel); padding: 10px 15px; border-radius: 6px; cursor: pointer; border: 1px solid transparent; transition: 0.2s; font-weight: bold; border-left: 4px solid var(--accent-gold); display: flex; justify-content: space-between;}
        .char-list-item:hover { background: #23232d; border-color: var(--border-subtle); transform: translateX(3px); }

        .tabs { display: flex; gap: 15px; margin-bottom: 20px; border-bottom: 2px solid var(--border-subtle); padding-bottom: 5px; }
        .tab-btn { background: none; border: none; color: var(--text-muted); font-size: 15px; font-weight: 600; cursor: pointer; padding: 8px 10px; transition: all 0.3s ease; text-transform: uppercase; letter-spacing: 1px; }
        .tab-btn:hover { color: var(--text-main); }
        .tab-btn.active { color: var(--accent-gold); border-bottom: 2px solid var(--accent-gold); text-shadow: 0 0 8px var(--accent-glow); }

        .tab-content { display: none; animation: fadeIn 0.3s ease; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .form-group { margin-bottom: 12px; }
        label { display: block; font-size: 10px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 4px; letter-spacing: 0.5px; }
        input[type="text"], input[type="number"], select, textarea { width: 100%; background: var(--bg-panel); border: 1px solid var(--border-subtle); color: var(--text-main); padding: 10px; border-radius: 6px; box-sizing: border-box; transition: 0.2s; font-family: inherit;}
        input:focus, select:focus, textarea:focus { border-color: var(--accent-gold); outline: none; box-shadow: 0 0 5px var(--accent-glow); }
        
        .photo-slot { width: 90px; height: 120px; background: var(--bg-panel); border: 1px dashed var(--accent-gold); border-radius: 6px; display: flex; align-items: center; justify-content: center; color: var(--text-muted); font-size: 12px; text-align: center; box-shadow: inset 0 0 10px rgba(0,0,0,0.5); cursor: pointer; background-size: cover; background-position: center; transition: 0.2s; overflow: hidden;}

        .section-title { color: var(--accent-gold); margin: 20px 0 10px 0; border-bottom: 1px solid var(--border-subtle); padding-bottom: 5px; font-size: 14px;}
        
        .status-box { display: flex; gap: 10px; margin-bottom: 15px;}
        .status-item { flex: 1; background: #222; padding: 10px; border-radius: 6px; border-left: 3px solid var(--accent-gold); text-align: center;}
        .status-item span { display: block; font-size: 18px; font-weight: bold; margin-top: 5px; color: #fff;}

        .attr-box { display: flex; justify-content: space-between; align-items: center; background: linear-gradient(90deg, var(--bg-panel) 0%, var(--bg-dark) 100%); padding: 12px 15px; margin-bottom: 8px; border-radius: 6px; border-left: 4px solid var(--accent-gold); font-weight: bold; }
        .attr-input { width: 50px !important; text-align: center; font-size: 16px; font-weight: bold;}
        .d20-icon { width: 16px; height: 16px; fill: none; stroke: var(--accent-gold); stroke-width: 2; vertical-align: middle; margin-left: 6px; margin-bottom: 2px;}

        .skill-item { display: flex; justify-content: space-between; align-items: center; background: var(--bg-panel); padding: 10px 15px; margin-bottom: 8px; border-radius: 6px; cursor: pointer; border: 1px solid transparent; transition: 0.2s; }
        .skill-item:hover { background: #23232d; border-color: var(--border-subtle); transform: translateX(3px); }
        .skill-controls { display: flex; align-items: center; gap: 12px; }
        .btn-ctrl { background: var(--border-subtle); border: none; color: var(--text-main); width: 28px; height: 28px; border-radius: 4px; cursor: pointer; font-weight: bold; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .btn-ctrl:hover { background: var(--accent-gold); color: #000; }

        /* Estilos da Mochila */
        .inv-item { display: flex; flex-wrap: wrap; gap: 5px; background: var(--bg-panel); padding: 10px; border-radius: 6px; margin-bottom: 8px; border-left: 3px solid #666;}
        .inv-row { display: flex; gap: 5px; width: 100%; }
        .inv-input { padding: 6px !important; font-size: 12px; }
        .btn-danger { background: #3a1c1c; border: none; color: #fff; cursor: pointer; border-radius: 4px; padding: 0 10px;}
        .btn-danger:hover { background: var(--danger); }
        .overweight { border-color: var(--danger) !important; color: var(--danger) !important; }
    </style>
</head>
<body>

    <div id="loading">📖 Carregando Grimório...</div>

    <div class="app-container" id="app">
        <div id="screen-list" class="screen active">
            <h3 class="section-title" style="text-align: center; margin-top: 5px; border:none;">Mesa Global</h3>
            
            <button class="btn-new" onclick="createNewCharacter()">+ Criar Novo Personagem</button>
            <input type="file" id="import-file" accept=".json" style="display: none;" onchange="importCharacter(event)">
            <button class="btn-import" onclick="document.getElementById('import-file').click()">📥 Importar Ficha (JSON)</button>

            <div id="character-folders"></div>
        </div>

        <div id="screen-sheet" class="screen">
            <div class="top-bar">
                <button class="btn-ctrl" onclick="backToList()" style="width: auto; padding: 0 10px; font-size: 12px;">← Voltar</button>
                <div style="display: flex; gap: 5px;">
                    <button class="btn-ctrl" onclick="exportCharacter()" style="width: auto; padding: 0 10px; background: #222; font-size: 12px;">📤 Exportar</button>
                    <button class="btn-ctrl" onclick="deleteCharacter()" style="width: auto; padding: 0 10px; background: #5a1a1a; font-size: 12px;">Apagar</button>
                </div>
            </div>

            <div class="tabs">
                <button class="tab-btn active" onclick="openTab('personagem')">Personagem</button>
                <button class="tab-btn" onclick="openTab('pericias')">Perícias</button>
                <button class="tab-btn" onclick="openTab('mochila')">Mochila</button>
            </div>

            <div id="personagem" class="tab-content active">
                <div style="display: flex; gap: 15px; margin-bottom: 10px;">
                    <label for="photo-upload" class="photo-slot" id="photo-preview"><span id="photo-text">📷<br>Importar</span></label>
                    <input type="file" id="photo-upload" accept="image/*" style="display: none;">
                    <div style="flex: 1;">
                        <div class="form-group"><label>Nome</label><input type="text" id="char-name"></div>
                        <div style="display: flex; gap: 5px;">
                            <div class="form-group" style="flex: 1;"><label>Idade</label><input type="number" id="char-age"></div>
                            <div class="form-group" style="flex: 2;"><label>Raça</label><input type="text" id="char-race" value="Humano"></div>
                        </div>
                    </div>
                </div>

                <div style="display: flex; gap: 10px;">
                    <div class="form-group" style="flex: 1;">
                        <label>Classe</label>
                        <select id="char-class" onchange="calcVitals()">
                            <option value="Plebeu">Plebeu</option>
                            <option value="Andarilho">Andarilho</option>
                            <option value="Estrangeiro">Estrangeiro</option>
                            <option value="Nobre">Nobre</option>
                        </select>
                    </div>
                    <div class="form-group" style="flex: 1;"><label>Profissão</label><input type="text" id="char-prof"></div>
                </div>
                <div class="form-group"><label>Descrição da Profissão</label><textarea id="char-prof-desc" rows="2"></textarea></div>

                <div class="form-group">
                    <label>📁 Pasta / Categoria</label>
                    <select id="char-category" onchange="saveData()">
                        <option value="Jogadores">Jogadores</option>
                        <option value="NPCs">NPCs</option>
                        <option value="Monstros">Monstros</option>
                    </select>
                </div>

                <div class="status-box">
                    <div class="status-item"><label style="color:#ff4444">Vida</label><span id="val-vida">100 / 100</span></div>
                    <div class="status-item"><label style="color:#44aaff">Mana</label><span id="val-mana">50 / 50</span></div>
                </div>

                <h4 class="section-title">Atributos</h4>
                <div class="attr-box"><span>Força <svg class="d20-icon" width="16" height="16" fill="none" stroke="#d4af37" viewBox="0 0 24 24"><polygon points="12 2 2 12 12 22 22 12 12 2"></polygon><line x1="12" y1="2" x2="12" y2="22"></line><line x1="2" y1="12" x2="22" y2="12"></line></svg></span><input type="number" id="attr-forca" class="attr-input" value="1" oninput="calcVitals()"></div>
                <div class="attr-box"><span>Magia <svg class="d20-icon" width="16" height="16" fill="none" stroke="#d4af37" viewBox="0 0 24 24"><polygon points="12 2 2 12 12 22 22 12 12 2"></polygon><line x1="12" y1="2" x2="12" y2="22"></line><line x1="2" y1="12" x2="22" y2="12"></line></svg></span><input type="number" id="attr-magia" class="attr-input" value="1" oninput="calcVitals()"></div>
                <div class="attr-box"><span>Agilidade <svg class="d20-icon" width="16" height="16" fill="none" stroke="#d4af37" viewBox="0 0 24 24"><polygon points="12 2 2 12 12 22 22 12 12 2"></polygon><line x1="12" y1="2" x2="12" y2="22"></line><line x1="2" y1="12" x2="22" y2="12"></line></svg></span><input type="number" id="attr-agilidade" class="attr-input" value="1" oninput="calcVitals()"></div>
                <div class="attr-box"><span>Sorte <svg class="d20-icon" width="16" height="16" fill="none" stroke="#d4af37" viewBox="0 0 24 24"><polygon points="12 2 2 12 12 22 22 12 12 2"></polygon><line x1="12" y1="2" x2="12" y2="22"></line><line x1="2" y1="12" x2="22" y2="12"></line></svg></span><input type="number" id="attr-sorte" class="attr-input" value="1" oninput="calcVitals()"></div>

                <h4 class="section-title">📖 Grimório</h4>
                <div class="form-group"><input type="text" id="grimoire-name" placeholder="Nome do Grimório"></div>
                <div class="form-group"><label>🔮 Mana Zone</label><input type="text" id="mana-zone"></div>
                <div class="form-group"><label>Habilidade 1</label><input type="text" id="hab-1" placeholder="Desc | Custo | Alcance"></div>
                <div class="form-group"><label>Habilidade 2</label><input type="text" id="hab-2"></div>
                <div class="form-group"><label>Habilidade 3</label><input type="text" id="hab-3"></div>
                <div class="form-group"><label>Habilidade 4</label><input type="text" id="hab-4"></div>
            </div>

            <div id="pericias" class="tab-content"><div id="skills-container"></div></div>

            <div id="mochila" class="tab-content">
                <div class="status-box">
                    <div class="status-item" id="box-peso">
                        <label>Peso do Personagem</label>
                        <span id="val-peso">0 / 5</span>
                    </div>
                </div>
                <p id="peso-aviso" style="color: var(--danger); font-size: 11px; text-align: center; display: none; font-weight: bold;">⚠️ SOBREPESO! Desvantagem de -5 em Força e Agilidade.</p>
                
                <h4 class="section-title" style="display: flex; justify-content: space-between;">Itens 
                    <button class="btn-ctrl" style="width:auto; padding: 2px 10px;" onclick="addInventoryItem()">+ Item</button>
                </h4>
                <div id="inventory-container"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@owlbear-rodeo/sdk@2/lib/index.js"></script>
    <script src="script.js?v=25"></script>
</body>
</html>
