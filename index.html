<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fate Sheet</title>
    <style>
        :root { --bg-dark: #0f0f13; --bg-panel: #1c1c24; --accent-gold: #d4af37; --text-main: #eaeaef; --text-muted: #8a8a9e; --border-subtle: #2a2a35; --danger: #ff4444; }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; background: var(--bg-dark); color: var(--text-main); padding: 15px; margin: 0; overflow-x: hidden; }
        #loading { text-align: center; color: var(--accent-gold); margin-top: 50px; font-weight: bold; font-size: 18px; animation: pulse 1.5s infinite;}
        @keyframes pulse { 0% { opacity: 0.5; } 50% { opacity: 1; } 100% { opacity: 0.5; } }
        .app-container { display: none; }
        .screen { display: none; animation: fadeIn 0.3s ease; }
        .screen.active { display: block; }
        
        .top-bar { display: flex; justify-content: space-between; margin-bottom: 15px; border-bottom: 1px solid var(--border-subtle); padding-bottom: 10px;}
        .btn-new { width: 100%; padding: 12px; background: rgba(212, 175, 55, 0.05); border: 1px dashed var(--accent-gold); color: var(--accent-gold); font-weight: bold; font-size: 14px; border-radius: 6px; cursor: pointer; transition: 0.2s; margin-bottom: 10px;}
        .btn-new:hover { background: var(--accent-gold); color: #000; }
        
        .btn-import { width: 100%; padding: 10px; background: #1a1a24; border: 1px solid var(--border-subtle); color: var(--text-muted); font-size: 12px; border-radius: 6px; cursor: pointer; transition: 0.2s; margin-bottom: 20px;}
        .btn-import:hover { border-color: var(--accent-gold); color: var(--accent-gold); }

        .folder-header { display: flex; align-items: center; cursor: pointer; color: var(--accent-gold); font-size: 13px; font-weight: bold; text-transform: uppercase; letter-spacing: 1px; margin: 15px 0 8px 0; border-bottom: 1px solid var(--border-subtle); padding-bottom: 5px; transition: 0.2s;}
        .folder-header:hover { color: #fff; }
        .chevron { display: inline-block; width: 15px; transition: transform 0.3s ease; }
        
        /* CORREÇÃO DEFINITIVA DA LISTA EMBOLADA */
        .folder-content { display: none; flex-direction: column; width: 100%; margin-bottom: 15px; gap: 8px; }
        .folder-content.open { display: flex; }
        .char-list-item { display: flex; width: 100%; box-sizing: border-box; align-items: center; justify-content: space-between; background: var(--bg-panel); padding: 10px 15px; border-radius: 6px; cursor: pointer; border: 1px solid transparent; transition: 0.2s; font-weight: bold; border-left: 4px solid var(--accent-gold);}
        .char-list-item:hover { background: #23232d; border-color: var(--border-subtle); transform: translateX(3px); }

        .tabs { display: flex; gap: 15px; margin-bottom: 20px; border-bottom: 2px solid var(--border-subtle); padding-bottom: 5px; }
        .tab-btn { background: none; border: none; color: var(--text-muted); font-size: 15px; font-weight: 600; cursor: pointer; padding: 8px 10px; transition: all 0.3s ease; text-transform: uppercase; letter-spacing: 1px; }
        .tab-btn:hover { color: var(--text-main); }
        .tab-btn.active { color: var(--accent-gold); border-bottom: 2px solid var(--accent-gold); text-shadow: 0 0 8px var(--accent-gold); }

        .tab-content { display: none; animation: fadeIn 0.3s ease; }
        .tab-content.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(5px); } to { opacity: 1; transform: translateY(0); } }

        .form-group { margin-bottom: 12px; }
        label { display: block; font-size: 10px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 4px; letter-spacing: 0.5px; }
        input[type="text"], input[type="number"], select, textarea, input[type="color"] { width: 100%; background: var(--bg-panel); border: 1px solid var(--border-subtle); color: var(--text-main); padding: 10px; border-radius: 6px; box-sizing: border-box; transition: 0.2s; font-family: inherit;}
        input:focus, select:focus, textarea:focus { border-color: var(--accent-gold); outline: none; box-shadow: 0 0 5px var(--accent-gold); }
        
        .photo-slot { width: 90px; height: 120px; background: var(--bg-panel); border: 1px dashed var(--accent-gold); border-radius: 6px; display: flex; align-items: center; justify-content: center; color: var(--text-muted); font-size: 12px; text-align: center; box-shadow: inset 0 0 10px rgba(0,0,0,0.5); cursor: pointer; background-size: cover; background-position: center; transition: 0.2s; overflow: hidden;}

        .section-title { color: var(--accent-gold); margin: 20px 0 10px 0; border-bottom: 1px solid var(--border-subtle); padding-bottom: 5px; font-size: 14px;}
        
        .status-box { display: flex; gap: 8px; margin-bottom: 15px; align-items: center;}
        .status-item { flex: 1; background: #222; padding: 10px; border-radius: 6px; border-left: 3px solid var(--accent-gold); text-align: center;}
        .status-item span { display: block; font-size: 18px; font-weight: bold; margin-top: 5px; color: #fff;}

        .shield-box { background: #1a1a24; border: 2px solid var(--border-subtle); clip-path: polygon(0 0, 100% 0, 100% 75%, 50% 100%, 0 75%); padding: 15px 5px 25px 5px; text-align: center; flex: 1; box-shadow: inset 0 0 15px rgba(0,0,0,0.8); transition: 0.3s;}
        .shield-box.fisica { border-color: var(--danger); }
        .shield-box.magica { border-color: #44aaff; }
        .shield-box label { display: block; font-size: 10px; text-transform: uppercase; margin-bottom: 5px; font-weight: bold; color: inherit; }
        .shield-box span { font-size: 24px; font-weight: bold; color: #fff; text-shadow: 0 0 5px rgba(255,255,255,0.3); }

        .attr-box { display: flex; justify-content: space-between; align-items: center; background: linear-gradient(90deg, var(--bg-panel) 0%, var(--bg-dark) 100%); padding: 12px 15px; margin-bottom: 8px; border-radius: 6px; border-left: 4px solid var(--accent-gold); font-weight: bold; }
        .attr-input { width: 50px !important; text-align: center; font-size: 16px; font-weight: bold;}

        .skill-item { display: flex; justify-content: space-between; align-items: center; background: var(--bg-panel); padding: 10px 15px; margin-bottom: 8px; border-radius: 6px; cursor: pointer; border: 1px solid transparent; transition: 0.2s; }
        .skill-item:hover { background: #23232d; border-color: var(--border-subtle); transform: translateX(3px); }
        .skill-controls { display: flex; align-items: center; gap: 12px; }
        .btn-ctrl { background: var(--border-subtle); border: none; color: var(--text-main); width: 28px; height: 28px; border-radius: 4px; cursor: pointer; font-weight: bold; display: flex; align-items: center; justify-content: center; transition: 0.2s; }
        .btn-ctrl:hover { background: var(--accent-gold); color: #000; }

        .inv-item, .spell-item { display: flex; flex-direction: column; gap: 5px; background: var(--bg-panel); padding: 10px; border-radius: 6px; margin-bottom: 12px; }
        .inv-item { border-left: 3px solid #666; }
        .spell-item { border-left: 3px solid #8a8a9e; box-shadow: 0 4px 6px rgba(0,0,0,0.3); }
        .inv-row { display: flex; gap: 5px; width: 100%; align-items: center; }
        .inv-input { padding: 8px !important; font-size: 12px; }
        .btn-danger { background: #3a1c1c; border: none; color: #fff; cursor: pointer; border-radius: 4px; padding: 6px 10px; transition: 0.2s; font-weight: bold;}
        .btn-danger:hover { background: var(--danger); }
        .overweight { border-color: var(--danger) !important; color: var(--danger) !important; }

        .spell-header { display: flex; justify-content: space-between; align-items: center; cursor: pointer; padding: 2px 0;}
        .dice-config-row { display: flex; flex-direction: column; gap: 5px; margin-top: 5px; background: #15151e; padding: 8px; border-radius: 4px; border: 1px dashed var(--border-subtle);}
        .dice-group { display: flex; align-items: center; gap: 4px; background: #111; padding: 4px 8px; border-radius: 4px; border: 1px solid #333; width: 100%; box-sizing: border-box;}
        .dice-group span.lbl { font-size: 11px; font-weight: bold; text-transform: uppercase; width: 35px;}
        .dice-qty { width: 45px !important; padding: 4px !important; text-align: center; font-weight: bold; }
        .dice-sel { width: auto !important; padding: 4px !important; font-size: 12px; cursor: pointer; font-weight: bold; background: #222;}
        .btn-roll-spell { background: rgba(212, 175, 55, 0.15); color: var(--accent-gold); border: 1px solid var(--accent-gold); font-size: 16px; cursor: pointer; border-radius: 6px; padding: 6px 12px; font-weight: bold; transition: 0.2s; display: flex; align-items: center; justify-content: center;}
        .btn-roll-spell:hover { background: var(--accent-gold); color: #000; transform: scale(1.05); }

        .mult-group { display: flex; gap: 2px; background: #000; padding: 3px; border-radius: 4px; margin-left: auto; }
        .mult-btn { cursor: pointer; padding: 2px 8px; font-size: 10px; font-weight: bold; border-radius: 3px; opacity: 0.3; transition: 0.2s; text-align: center;}
        .m-red { color: #ff4444; border: 1px solid #ff4444; }
        .m-red.active, .m-red:hover { background: #ff4444; color: #000; opacity: 1; }
        .m-white { color: #fff; border: 1px solid #fff; }
        .m-white.active, .m-white:hover { background: #fff; color: #000; opacity: 1; }
        .m-green { color: #00ff00; border: 1px solid #00ff00; }
        .m-green.active, .m-green:hover { background: #00ff00; color: #000; opacity: 1; }
        
        .btn-rune { background: transparent; border: 1px dashed; border-radius: 4px; font-size: 10px; padding: 6px 10px; cursor: pointer; transition: 0.2s; font-weight: bold; }
        .b-alpha { color: #44aaff; border-color: #44aaff; }
        .b-alpha:hover { background: #44aaff; color: #000; }
        .b-delta { color: #ff4444; border-color: #ff4444; }
        .b-delta:hover { background: #ff4444; color: #000; }
        .b-arma { color: #ccc; border-color: #ccc; }
        .b-arma:hover { background: #ccc; color: #000; }
    </style>
</head>
<body>

    <div id="loading">📖 Carregando Mesa Global...</div>

    <div class="app-container" id="app">
        <div id="screen-list" class="screen active">
            <h3 class="section-title" style="text-align: center; margin-top: 5px; border:none;">Mesa Global</h3>
            <button class="btn-new" onclick="createNewCharacter()">+ Criar Novo Personagem</button>
            <input type="file" id="import-file" accept=".json" style="display: none;" onchange="importCharacter(event)">
            <button class="btn-import" onclick="document.getElementById('import-file').click()">📥 Importar Ficha (JSON)</button>
            <div id="character-folders"></div>
        </div>

        <div id="screen-sheet" class="screen">
            <div class="top-bar">
                <button class="btn-ctrl" onclick="backToList()" style="width: auto; padding: 0 10px; font-size: 12px;">← Voltar</button>
                <div style="display: flex; gap: 5px;">
                    <button class="btn-ctrl" onclick="exportCharacter()" style="width: auto; padding: 0 10px; background: #222; font-size: 12px;">📤 Exportar</button>
                    <button class="btn-ctrl" onclick="deleteCharacter()" style="width: auto; padding: 0 10px; background: #5a1a1a; font-size: 12px;">Apagar Ficha</button>
                </div>
            </div>

            <div class="tabs">
                <button class="tab-btn active" onclick="openTab('personagem', event)">Personagem</button>
                <button class="tab-btn" onclick="openTab('pericias', event)">Perícias</button>
                <button class="tab-btn" onclick="openTab('mochila', event)">Mochila</button>
            </div>

            <div id="personagem" class="tab-content active">
                <div class="form-group" style="margin-bottom: 20px;">
                    <label>📁 Pasta da Mesa</label>
                    <select id="char-category" onchange="updateCategoryUI()">
                        <option value="Jogadores">Jogadores</option>
                        <option value="NPCs">NPCs</option>
                        <option value="Monstros">Monstros</option>
                    </select>
                </div>

                <div style="display: flex; gap: 15px; margin-bottom: 10px;">
                    <label for="photo-upload" class="photo-slot" id="photo-preview"><span id="photo-text">📷<br>Importar</span></label>
                    <input type="file" id="photo-upload" accept="image/*" style="display: none;">
                    <div style="flex: 1;">
                        <div class="form-group"><label>Nome</label><input type="text" id="char-name"></div>
                        <div style="display: flex; gap: 5px;">
                            <div class="form-group" style="flex: 1;"><label>Idade</label><input type="number" id="char-age"></div>
                            <div class="form-group" style="flex: 2;">
                                <label>Raça</label>
                                <input type="text" id="char-race-player" value="Humano">
                                <select id="char-race-monster" style="display: none;">
                                    <option value="Terrestres">Terrestres</option>
                                    <option value="Voadores">Voadores</option>
                                    <option value="Aquáticos">Aquáticos</option>
                                </select>
                            </div>
                            <div class="form-group" style="flex: 1;">
                                <label>Aura</label>
                                <input type="color" id="char-color" value="#d4af37" onchange="updateSheetColor()" style="padding: 2px; height: 36px; cursor:pointer;">
                            </div>
                        </div>
                    </div>
                </div>

                <div id="box-classe-prof">
                    <div style="display: flex; gap: 10px;">
                        <div class="form-group" style="flex: 1;">
                            <label>Classe</label>
                            <select id="char-class" onchange="calcVitals()">
                                <option value="Plebeu">Plebeu</option>
                                <option value="Andarilho">Andarilho</option>
                                <option value="Estrangeiro">Estrangeiro</option>
                                <option value="Nobre">Nobre</option>
                            </select>
                        </div>
                        <div class="form-group" style="flex: 1;"><label>Profissão</label><input type="text" id="char-prof"></div>
                    </div>
                    <div class="form-group"><label>Descrição da Profissão</label><textarea id="char-prof-desc" rows="2"></textarea></div>
                </div>

                <div class="status-box">
                    <div class="status-item">
                        <label style="color:#ff4444">Vida</label>
                        <span id="val-vida-player">40 / 40</span>
                        <input type="number" id="val-vida-monster" value="100" style="display:none; width: 100%; background: transparent; border: none; color: #fff; font-size: 18px; font-weight: bold; text-align: center; outline: none; border-bottom: 1px dashed #ff4444; margin-top: 5px;" onchange="saveData()">
                    </div>
                    <div class="status-item"><label style="color:#44aaff">Mana</label><span id="val-mana">25 / 25</span></div>
                    
                    <div class="form-group" style="width: 50px; margin-bottom: 0;">
                        <label style="text-align: center; color:#a855f7;">Runas</label>
                        <div style="display:flex; align-items:center; background: var(--bg-panel); border: 1px solid var(--border-subtle); border-radius: 6px;">
                            <input type="number" id="char-runas" value="0" style="border:none; background:transparent; padding: 8px 2px; text-align:center; color:#fff; width:100%;" onchange="saveData()">
                        </div>
                    </div>

                    <div class="form-group" style="width: 60px; margin-bottom: 0;">
                        <label style="text-align: center;">Mov</label>
                        <div style="display:flex; align-items:center; background: var(--bg-panel); border: 1px solid var(--border-subtle); border-radius: 6px; padding-right: 5px;">
                            <input type="number" id="char-mov" value="30" style="border:none; background:transparent; padding: 8px 2px; text-align:center; color:#fff; width:100%;" onchange="saveData()">
                            <span style="font-size:10px; color:#888; font-weight:bold;">ft</span>
                        </div>
                    </div>
                </div>

                <div class="status-box" style="gap: 20px; padding: 0 10px; margin-top: 10px;">
                    <div class="shield-box fisica">
                        <label style="color: var(--danger);">Defesa Física</label>
                        <span id="val-def-fisica">0</span>
                    </div>
                    <div class="shield-box magica">
                        <label style="color: #44aaff;">Defesa Mágica</label>
                        <span id="val-def-magica">0</span>
                    </div>
                </div>

                <h4 class="section-title">Atributos</h4>
                <div class="attr-box"><span>Força</span><input type="number" id="attr-forca" class="attr-input" value="1" oninput="calcVitals()"></div>
                <div class="attr-box"><span>Magia</span><input type="number" id="attr-magia" class="attr-input" value="1" oninput="calcVitals()"></div>
                <div class="attr-box"><span>Agilidade</span><input type="number" id="attr-agilidade" class="attr-input" value="1" oninput="calcVitals()"></div>
                <div class="attr-box"><span>Sorte</span><input type="number" id="attr-sorte" class="attr-input" value="1" oninput="calcVitals()"></div>

                <h4 class="section-title">📖 Grimório</h4>
                <div class="form-group"><input type="text" id="grimoire-name" placeholder="Nome do Grimório"></div>
                <div class="form-group"><label>🔮 Mana Zone</label><textarea id="mana-zone" rows="2" placeholder="Descreva sua Mana Zone..."></textarea></div>
                <div class="form-group"><label>🌟 Passiva</label><textarea id="passiva" rows="2" placeholder="Descreva a Passiva do Grimório..."></textarea></div>
                
                <h4 class="section-title" style="display: flex; justify-content: space-between; align-items: center; margin-top: 30px;">
                    Habilidades / Magias
                    <button class="btn-ctrl" style="width:auto; padding: 4px 12px; font-size: 11px;" onclick="addSpell()">+ Magia</button>
                </h4>
                <div id="spells-container"></div>
            </div>

            <div id="pericias" class="tab-content"><div id="skills-container"></div></div>

            <div id="mochila" class="tab-content">
                <div class="status-box">
                    <div class="status-item" id="box-peso">
                        <label>Peso</label>
                        <span id="val-peso">0 / 5</span>
                    </div>
                </div>
                <p id="peso-aviso" style="color: var(--danger); font-size: 11px; text-align: center; display: none; font-weight: bold;">⚠️ SOBREPESO! -5 em TODAS as rolagens.</p>
                <h4 class="section-title" style="display: flex; justify-content: space-between;">Itens 
                    <button class="btn-ctrl" style="width:auto; padding: 2px 10px;" onclick="addInventoryItem()">+ Item</button>
                </h4>
                <div id="inventory-container"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@owlbear-rodeo/sdk@2/lib/index.js"></script>
    <script type="module" src="script.js?v=99901"></script>
</body>
</html>
